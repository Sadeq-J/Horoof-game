<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة حروف</title>
    <link rel="stylesheet" href="./css/style.css">
    <script defer src="./js/app.js"></script>
</head>

<body>

    <div action="" class="start-screen">
        <div class="wrapper">
            <h1>لعبة حروف</h1>
            <div class="input-box" id="team1">
                <input type="text" placeholder="اسم الفريق الاول" id="first-team" required>
            </div>
            <div class="input-box" id="team2">
                <input type="text" placeholder="اسم الفريق الثاني" id="second-team" required>
            </div>
            <button class="ply-btn">العب</button>
        </div>
    </div>

    <section class="board hidden">
        <div class="sqr" id="0">أ</div>
        <div class="sqr" id="1">د</div>
        <div class="sqr" id="2">ن</div>
        <div class="sqr" id="3">س</div>
        <div class="sqr" id="4">ص</div>
        <div class="sqr" id="5">ع</div>
        <div class="sqr" id="6">ب</div>
        <div class="sqr" id="7">ر</div>
        <div class="sqr" id="8">خ</div>
    </section>

    <div class="qus hidden">
        <h1 class="letter"></h1>
        <h1 class="question">:السؤال</h1>
        <h1 class="question" id="qun"></h1>

        <div class="q-btn">
            <button class="q-menu-btn" id="answer-btn">الاجابة</button>
            <button class="q-menu-btn" id="change-answer-btn">تغير السؤال</button>
        </div>
    </div>

    <div class="answer-menu hidden">
        <h1 id="q"></h1>
        <h1 class="ques-answer"></h1>

        <button id="no-answer-btn">ولا واحد</button>
        <div class="team-btn">
            <button id="team-1"></button>
            <button id="team-2"></button>
        </div>
    </div>

    <div class="winner-screen hidden">
        <h1 id="winner-text"></h1>
        <button id="restart-btn">Restart</button>
    </div>
</body>

</html>
